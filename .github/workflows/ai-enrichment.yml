name: AI Enrichment Trial (HELD)

# AI enricher held — schedule disabled. Manual dispatch exits until deliberately re-enabled.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of priority listings to enrich"
        required: false
        default: "50"
      daily_budget:
        description: "Max OpenRouter provider calls per IST day"
        required: false
        default: "300"
      allow_network:
        description: "Use live OpenRouter calls"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  ai-enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ai-enrichment
      cancel-in-progress: false
    steps:
      - name: Held notice
        run: |
          echo "AI enricher is HELD. Schedule removed; refusing run."
          exit 1

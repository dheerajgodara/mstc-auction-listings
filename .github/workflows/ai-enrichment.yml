name: AI Enrichment Trial

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of priority listings to enrich"
        required: false
        default: "100"
      allow_network:
        description: "Use live OpenRouter calls"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  ai-enrichment:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore AI enrichment cache
        uses: actions/cache@v4
        with:
          path: data/ai_enrichment_cache
          key: ai-enrichment-${{ runner.os }}-${{ hashFiles('scraper/ai_enrichment/schema.py', 'scraper/ai_enrichment/payload.py') }}
          restore-keys: |
            ai-enrichment-${{ runner.os }}-

      - name: Configure SSH key for production data fallback
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Bootstrap live production data
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          PYTHONPATH=. python - <<'PY'
          import json
          import os
          from scraper.config import DEFAULT_JSON_OUT
          from scraper.refresh_and_deploy import _bootstrap_previous_production_from_live

          warnings = []
          _bootstrap_previous_production_from_live(
              production_json=DEFAULT_JSON_OUT,
              base_url=os.environ.get("SITE_BASE_URL") or "https://scrapauctionindia.com/auctions",
              warnings=warnings,
          )
          data = json.loads(DEFAULT_JSON_OUT.read_text(encoding="utf-8"))
          print({"count": data.get("count"), "warnings": warnings})
          if int(data.get("count") or 0) < 1000:
              raise SystemExit("Refusing AI run: production bootstrap count below 1000")
          PY

      - name: Run AI enrichment priority trial
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
          OPENROUTER_SITE_URL: ${{ secrets.SITE_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p work/ai-enrichment
          NETWORK_FLAG=""
          if [ "${{ github.event.inputs.allow_network }}" = "true" ]; then
            NETWORK_FLAG="--allow-network"
          fi
          PYTHONPATH=. python -m scraper.ai_enrichment.cli \
            --json web/public/data/auctions.json \
            enrich \
            --limit "${{ github.event.inputs.limit || '100' }}" \
            $NETWORK_FLAG \
            --report-json work/ai-enrichment/report.json \
            --telegram-report | tee work/ai-enrichment/report.stdout.json

      - name: Upload AI enrichment report and cache snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-enrichment-${{ github.run_id }}
          path: |
            work/ai-enrichment/
            data/ai_enrichment_cache/
          if-no-files-found: ignore

name: Pipeline Parse

on:
  workflow_run:
    workflows: ["Pipeline Download"]
    types: [completed]
  schedule:
    # Catch-up / retry sweep every 3h UTC (:00) ≈ every 3h at :30 IST
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      max_parse:
        description: "Parse cap per run (default 200)"
        required: false
        default: "200"
      promote:
        description: "Promote candidate to auctions.json"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  pipeline-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-parse
      cancel-in-progress: false
    # After download: only on success. Schedule/manual always.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run parse pipeline
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MAX_PARSE="${{ github.event.inputs.max_parse || '200' }}"
          PROMOTE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.promote }}" = "false" ]; then
            PROMOTE_FLAG="--no-promote"
          fi
          PYTHONPATH=. python -m scraper.pipeline_parse \
            --sources mstc,gem_forward,eauction \
            --min-count 1000 \
            --max-parse "$MAX_PARSE" \
            --max-docs-per-run 200 \
            --break-stale-lock \
            $PROMOTE_FLAG

      - name: Upload parse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-parse-${{ github.run_id }}
          path: |
            work/pipeline_ledger.json
            work/runs/parse_*/parse_report.json
            work/runs/parse_*/parse.log
            work/runs/parse_*/candidate_auctions.json
          if-no-files-found: ignore

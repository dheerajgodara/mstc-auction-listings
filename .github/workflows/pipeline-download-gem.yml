name: Lane Download GeM

on:
  schedule:
    # Temporary backlog drain: ~every 45m (UTC :00 and :45)
    - cron: "0,45 * * * *"
  workflow_dispatch:
    inputs:
      max_download:
        description: "Per-run download cap (default 2000)"
        required: false
        default: "2000"

jobs:
  download-gem:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-download-gem
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Download GeM wave (parallel fetch + batch flush)
        timeout-minutes: 90
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOWNLOAD_SUCCESS_PAUSE_SEC: "0"
          DOWNLOAD_BATCH_RETRY_ROUNDS: "2"
          DOWNLOAD_WAVE_SIZE: "25"
          DOWNLOAD_FETCH_WORKERS_GEM: "3"
          DOWNLOAD_WAVE_DEADLINE_SEC: "600"
          DOWNLOAD_FETCH_TIMEOUT_SEC: "180"
          DOWNLOAD_STALL_ABORT_MIN: "20"
          DOWNLOAD_STREAM_FLUSH_EVERY: "10"
          DOWNLOAD_DECOUPLE_FLUSH: "1"
          SSH_CONNECT_TIMEOUT: "15"
          SSH_SERVER_ALIVE_INTERVAL: "30"
          RSYNC_IO_TIMEOUT: "120"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          CAP="${{ github.event.inputs.max_download }}"
          if [ -z "$CAP" ]; then CAP=2000; fi
          PYTHONPATH=. python -m scraper.pipeline_download \
            --source gem_forward \
            --wave-size 25 \
            --batch-size 25 \
            --max-batches 80 \
            --max-download "$CAP" \
            --skip-pdf \
            --break-stale-lock

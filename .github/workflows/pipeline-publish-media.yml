name: Lane Publish Media

on:
  schedule:
    # Drain fetched_local → Hostinger/R2 every 20m (staggered)
    - cron: "12,32,52 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "mstc | gem_forward | empty=all"
        required: false
        default: ""
      wave_size:
        description: "Items per wave"
        required: false
        default: "50"

jobs:
  publish-media:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: pipeline-publish-media
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Publish fetched_local to Hostinger/R2
        timeout-minutes: 90
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SSH_CONNECT_TIMEOUT: "15"
          SSH_SERVER_ALIVE_INTERVAL: "30"
          RSYNC_IO_TIMEOUT: "120"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          SRC="${{ github.event.inputs.source }}"
          WAVE="${{ github.event.inputs.wave_size }}"
          if [ -z "$WAVE" ]; then WAVE=50; fi
          EXTRA=""
          if [ -n "$SRC" ]; then EXTRA="--source $SRC"; fi
          PYTHONPATH=. python -m scraper.pipeline_publish_media \
            --wave-size "$WAVE" \
            --max-waves 40 \
            --break-stale-lock \
            $EXTRA

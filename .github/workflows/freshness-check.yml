name: Freshness Check

on:
  schedule:
    # Weekly Monday 06:00 IST = Sunday 00:30 UTC
    - cron: "30 0 * * 0"
  workflow_dispatch:

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check live export freshness
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          BASE="${SITE_BASE_URL:-https://scrapauctionindia.com/auctions}"
          PYTHONPATH=. python -m scraper.freshness_check --base-url "$BASE" --warn-only

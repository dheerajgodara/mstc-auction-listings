name: Lane Parse Assets

on:
  schedule:
    # Temporary backlog drain: every 30m (UTC); long jobs still self-resume
    - cron: "10,40 * * * *"
  workflow_dispatch:
    inputs:
      max_parse:
        description: "Per-run parse cap (empty = production unbounded / timebox)"
        required: false
        default: ""
      auction_ids:
        description: "Comma-separated source_auction_id filter (smoke)"
        required: false
        default: ""

jobs:
  parse-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-parse-assets
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Parse wave (PyMuPDF pool + batch flush)
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ENRICHMENT_DISABLE: "1"
          PARSE_SUCCESS_PAUSE_SEC: "0"
          PARSE_WAVE_SIZE: "100"
          PARSE_WORKERS: "2"
          PARSER_CACHE_VERSION: "2"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.max_parse }}" ]; then
            EXTRA="$EXTRA --max-parse ${{ github.event.inputs.max_parse }}"
          fi
          if [ -n "${{ github.event.inputs.auction_ids }}" ]; then
            EXTRA="$EXTRA --auction-ids ${{ github.event.inputs.auction_ids }}"
          fi
          # Timed smoke: seed 5 R2-backed rows when fixture present + max_parse set.
          if [ -n "${{ github.event.inputs.max_parse }}" ] && [ -f tests/fixtures/smoke_ledger_parse_5.json ]; then
            mkdir -p work
            cp tests/fixtures/smoke_ledger_parse_5.json work/pipeline_ledger.json
            export SKIP_LEDGER_PULL=1
            export SKIP_LEDGER_PUSH=1
            echo "seeded parse smoke ledger (5 R2 PDFs); ledger pull/push skipped"
          fi
          START=$(date +%s)
          PYTHONPATH=. python -m scraper.pipeline_parse_assets --break-stale-lock --wave-size 5 $EXTRA
          END=$(date +%s)
          echo "parse_smoke_wall_sec=$((END-START))"

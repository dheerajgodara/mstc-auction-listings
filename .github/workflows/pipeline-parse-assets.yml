name: Lane Parse Assets

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  parse-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-parse-assets
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Parse one-by-one
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ENRICHMENT_DISABLE: "1"
        run: |
          PYTHONPATH=. python -m scraper.pipeline_parse_assets --break-stale-lock

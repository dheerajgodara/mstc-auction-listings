name: Lane Parse Assets

on:
  schedule:
    # Steady-state: every 30m at :11 and :41 UTC (IST ≈ :41 / :11)
    - cron: "11,41 * * * *"
  workflow_dispatch:
    inputs:
      max_parse:
        description: "Per-run parse cap (default 400 steady-state)"
        required: false
        default: "400"
      auction_ids:
        description: "Comma-separated source_auction_id filter (smoke)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  parse-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: pipeline-parse-assets
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Restore ledger cache
        uses: actions/cache@v4
        with:
          path: work/pipeline_ledger.json
          key: pipeline-ledger-v1-${{ github.run_id }}
          restore-keys: |
            pipeline-ledger-v1-
      - name: Parse wave (PyMuPDF pool + batch flush)
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ENRICHMENT_DISABLE: "1"
          PARSE_SUCCESS_PAUSE_SEC: "0"
          PARSE_WAVE_SIZE: "100"
          PARSE_WORKERS: "2"
          PARSER_CACHE_VERSION: "4"
          GEM_REQUEUE_MAX_PER_RUN: "40"
          GEM_REQUEUE_ENABLE: "0"
          PIPELINE_JOB_TIMEBOX_MIN: "100"
          SSH_CONNECT_TIMEOUT: "20"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          echo "cron_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ) event=${{ github.event_name }}"
          EXTRA=""
          MAX_PARSE="${{ github.event.inputs.max_parse }}"
          if [ -z "$MAX_PARSE" ]; then MAX_PARSE=400; fi
          EXTRA="--max-parse $MAX_PARSE"
          if [ -n "${{ github.event.inputs.auction_ids }}" ]; then
            EXTRA="$EXTRA --auction-ids ${{ github.event.inputs.auction_ids }}"
          fi
          PYTHONPATH=. python -m scraper.pipeline_parse_assets --break-stale-lock $EXTRA
      - name: Save ledger cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: work/pipeline_ledger.json
          key: pipeline-ledger-v1-${{ github.run_id }}

name: Lane Download MSTC Smoke (20 PDF timed)

on:
  schedule:
    # Nightly 20-auction timed smoke (UTC ~02:15)
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      max_download:
        description: "Smoke cap (default 20)"
        required: false
        default: "20"

jobs:
  download-mstc-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: pipeline-download-mstc-smoke
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Timed 20-PDF MSTC smoke
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOWNLOAD_SUCCESS_PAUSE_SEC: "0"
          DOWNLOAD_BATCH_RETRY_ROUNDS: "1"
          DOWNLOAD_WAVE_SIZE: "20"
          DOWNLOAD_FETCH_WORKERS_MSTC: "6"
          DOWNLOAD_WAVE_DEADLINE_SEC: "240"
          DOWNLOAD_STREAM_FLUSH_EVERY: "5"
          DOWNLOAD_DECOUPLE_FLUSH: "1"
          DOWNLOAD_CIRCUIT_COOLDOWN_SEC: "25"
          PDF_DOWNLOAD_RETRIES: "3"
          PDF_BACKOFF_CAP_SEC: "12"
          R2_UPLOAD_WORKERS: "6"
          R2_SKIP_ACL: "1"
          MEDIA_R2_ONLY: "1"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          CAP="${{ github.event.inputs.max_download }}"
          if [ -z "$CAP" ]; then CAP=20; fi
          START=$(date +%s)
          PYTHONPATH=. python -m scraper.pipeline_download \
            --source mstc \
            --wave-size 20 \
            --batch-size 20 \
            --max-batches 2 \
            --max-download "$CAP" \
            --break-stale-lock
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "smoke_wall_sec=$ELAPSED"
          # Soft gate: log rate; hard-fail only if catastrophically slow with zero commits
          # (portal 500s are expected; success metric tracked in Telegram/wave_metrics).
          if [ "$ELAPSED" -gt 600 ]; then
            echo "WARN: smoke exceeded 10m wall ($ELAPSED s)"
          fi

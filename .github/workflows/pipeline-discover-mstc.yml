name: Lane Discover MSTC

on:
  schedule:
    # Temporary backlog drain: every 2h (UTC)
    - cron: "20 */2 * * *"
  workflow_dispatch:
    inputs:
      queue_cap:
        description: "Queue cap (default 2000)"
        required: false
        default: "2000"

jobs:
  discover-mstc:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: pipeline-discover-mstc
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Discover MSTC
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          QUEUE_CAP="${{ github.event.inputs.queue_cap || '2000' }}"
          PYTHONPATH=. python -m scraper.pipeline_discover \
            --sources mstc \
            --queue-cap "$QUEUE_CAP" \
            --break-stale-lock

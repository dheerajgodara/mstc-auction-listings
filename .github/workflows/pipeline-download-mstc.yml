name: Lane Download MSTC

on:
  schedule:
    # Temporary backlog drain: every 30m (UTC)
    - cron: "5,35 * * * *"
  workflow_dispatch:
    inputs:
      max_download:
        description: "Per-run download cap (default 2000)"
        required: false
        default: "2000"
      migrate_ledger:
        description: "Run ledger schema migrate before download"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  download-mstc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-download-mstc
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Migrate ledger (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.migrate_ledger == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: PYTHONPATH=. python -m scraper.pipeline_schema_migrate --pull --push
      - name: Download MSTC wave (parallel fetch + batch flush)
        timeout-minutes: 90
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOWNLOAD_SUCCESS_PAUSE_SEC: "0"
          DOWNLOAD_BATCH_RETRY_ROUNDS: "2"
          DOWNLOAD_WAVE_SIZE: "25"
          DOWNLOAD_FETCH_WORKERS_MSTC: "6"
          DOWNLOAD_WAVE_DEADLINE_SEC: "600"
          DOWNLOAD_FETCH_TIMEOUT_SEC: "120"
          DOWNLOAD_STALL_ABORT_MIN: "20"
          DOWNLOAD_STREAM_FLUSH_EVERY: "5"
          DOWNLOAD_DECOUPLE_FLUSH: "1"
          DOWNLOAD_CIRCUIT_COOLDOWN_SEC: "25"
          PDF_DOWNLOAD_RETRIES: "3"
          PDF_BACKOFF_CAP_SEC: "12"
          R2_UPLOAD_WORKERS: "6"
          R2_SKIP_ACL: "1"
          SSH_CONNECT_TIMEOUT: "15"
          SSH_SERVER_ALIVE_INTERVAL: "30"
          RSYNC_IO_TIMEOUT: "120"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          CAP="${{ github.event.inputs.max_download }}"
          if [ -z "$CAP" ]; then CAP=2000; fi
          mkdir -p work
          # Rate smoke: seed local ledger when Hostinger SSH is down (fixture = 20 pending MSTC).
          if [ "$CAP" -le 25 ] && [ -f tests/fixtures/smoke_ledger_mstc_20.json ]; then
            cp tests/fixtures/smoke_ledger_mstc_20.json work/pipeline_ledger.json
            export SKIP_LEDGER_PULL=1
            export SKIP_LEDGER_PUSH=1
            echo "seeded smoke ledger (20 items); ledger pull/push skipped"
          fi
          START=$(date +%s)
          PYTHONPATH=. python -m scraper.pipeline_download \
            --source mstc \
            --wave-size 20 \
            --batch-size 20 \
            --max-batches 2 \
            --max-download "$CAP" \
            --break-stale-lock
          END=$(date +%s)
          echo "smoke_wall_sec=$((END-START))"

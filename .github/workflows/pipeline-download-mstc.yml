name: Lane Download MSTC

on:
  schedule:
    # Temporary backlog drain: every 30m (UTC)
    - cron: "5,35 * * * *"
  workflow_dispatch:
    inputs:
      max_download:
        description: "Per-run download cap (empty = production uncapped)"
        required: false
        default: ""
      migrate_ledger:
        description: "Run ledger schema migrate before download"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  download-mstc:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-download-mstc
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Migrate ledger (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.migrate_ledger == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: PYTHONPATH=. python -m scraper.pipeline_schema_migrate --pull --push
      - name: Download MSTC PDFs
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOWNLOAD_SUCCESS_PAUSE_SEC: "5"
        run: |
          EXTRA=""
          if [ -n "${{ github.event.inputs.max_download }}" ]; then
            EXTRA="--max-download ${{ github.event.inputs.max_download }}"
          fi
          PYTHONPATH=. python -m scraper.pipeline_download \
            --source mstc \
            --batch-size 25 \
            --max-batches 80 \
            --break-stale-lock \
            $EXTRA

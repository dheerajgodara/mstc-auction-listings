name: Pipeline Discover

on:
  schedule:
    # 00/06/12/18 IST (= 30 0,6,12,18 UTC) — owns the 6h slot
    - cron: "30 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      queue_cap:
        description: "Max MSTC auctions to queue for download (default 2000)"
        required: false
        default: "2000"
      retry_of:
        description: "Optional failed run id this dispatch retries"
        required: false
        default: ""

jobs:
  pipeline-discover:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: auction-pipeline-serial
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scheduled slot guard
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.retry_of == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: PYTHONPATH=. python -m scraper.schedule_guard --workflow pipeline-discover.yml

      - name: Set up Python
        if: env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: pip install -r requirements.txt

      - name: Configure SSH key
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run discover pipeline
        if: env.REFRESH_SHOULD_RUN != 'false'
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          QUEUE_CAP="${{ github.event.inputs.queue_cap || '2000' }}"
          for attempt in 1 2; do
            echo "Discover attempt ${attempt}/2 (queue_cap=$QUEUE_CAP)"
            if PYTHONPATH=. python -m scraper.pipeline_discover \
              --sources mstc,gem_forward,eauction \
              --queue-cap "$QUEUE_CAP" \
              --batch-size 25 \
              --break-stale-lock; then
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "Discover failed; sleeping 120s before intra-job retry"
              sleep 120
            fi
          done
          exit 1

      - name: Upload discover reports
        if: always() && env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-discover-${{ github.run_id }}
          path: |
            work/pipeline_ledger.json
            work/runs/discover_*/discover_report.json
            work/runs/discover_*/discover.log
            work/runs/discover_*/discovery_latest.json
          if-no-files-found: ignore

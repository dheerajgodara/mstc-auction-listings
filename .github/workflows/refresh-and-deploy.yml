name: Refresh and Deploy

on:
  schedule:
    # Eight daily production refresh attempts.
    # IST: 00:30, 03:30, 06:30, 09:30, 12:30, 15:30, 18:30, 21:30
    # UTC: 19:00 previous day, 22:00 previous day, 01:00, 04:00, 07:00, 10:00, 13:00, 16:00
    - cron: "0 19 * * *"
    - cron: "0 22 * * *"
    - cron: "0 1 * * *"
    - cron: "0 4 * * *"
    - cron: "0 7 * * *"
    - cron: "0 10 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Hostinger after successful gates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_docs_per_run:
        description: "Max MSTC document downloads per run"
        required: false
        default: "2000"
      max_deep_scrape:
        description: "Max auctions to deep scrape in this run"
        required: false
        default: "200"

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -q

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run refresh pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
          OPENROUTER_SITE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DEPLOY_FLAG=""
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.deploy }}" != "false" ]; then
            DEPLOY_FLAG="--deploy"
          fi
          PYTHONPATH=. python -m scraper.refresh_and_deploy \
            --sources mstc,gem_forward,eauction \
            --max-docs-per-run "${{ github.event.inputs.max_docs_per_run || '2000' }}" \
            --max-deep-scrape "${{ github.event.inputs.max_deep_scrape || '200' }}" \
            --min-count 1000 \
            --break-stale-lock \
            --warn-missing-eauction \
            $DEPLOY_FLAG

      - name: Post-deploy freshness check (warn-only)
        if: success()
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          BASE="${SITE_BASE_URL:-https://scrapauctionindia.com/auctions}"
          PYTHONPATH=. python -m scraper.freshness_check --base-url "$BASE" --warn-only || true

      - name: Upload refresh reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-run-${{ github.run_id }}
          path: |
            work/runs/latest.json
            work/runs/*/reports/final_report.md
            work/runs/*/reports/final_report.json
            work/runs/*/logs/
          if-no-files-found: ignore

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-failure-${{ github.run_id }}
          path: |
            work/refresh.lock
            work/runs/
          if-no-files-found: ignore

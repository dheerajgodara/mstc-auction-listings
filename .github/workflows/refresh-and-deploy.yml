name: Refresh and Deploy

on:
  schedule:
    # Catch-up cadence: hourly at :00 IST (30 * * * * UTC).
    # schedule_guard skips if a prior run is still queued/running.
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Hostinger after successful gates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_docs_per_run:
        description: "Max MSTC document downloads per run"
        required: false
        default: "2000"
      max_deep_scrape:
        description: "Max auctions to deep scrape in this run"
        required: false
        default: "200"
      full_reconcile:
        description: "Manual catch-up: deep scrape every new/changed/repair listing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: refresh-and-deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scheduled slot guard
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: PYTHONPATH=. python -m scraper.schedule_guard --workflow refresh-and-deploy.yml

      - name: Set up Python
        if: env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: pip install -r requirements.txt

      - name: Run tests
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: PYTHONPATH=. python -m pytest tests/ -q

      - name: Set up pnpm
        if: env.REFRESH_SHOULD_RUN != 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        if: env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        if: env.REFRESH_SHOULD_RUN != 'false'
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Configure SSH key
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run refresh pipeline
        if: env.REFRESH_SHOULD_RUN != 'false'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
          OPENROUTER_SITE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DEPLOY_FLAG=""
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.deploy }}" != "false" ]; then
            DEPLOY_FLAG="--deploy"
          fi
          FULL_RECONCILE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_reconcile }}" = "true" ]; then
            FULL_RECONCILE_FLAG="--full-reconcile"
          fi
          PYTHONPATH=. python -m scraper.refresh_and_deploy \
            --sources mstc,gem_forward,eauction \
            --max-docs-per-run "${{ github.event.inputs.max_docs_per_run || '2000' }}" \
            --max-deep-scrape "${{ github.event.inputs.max_deep_scrape || '200' }}" \
            --min-count 1000 \
            --break-stale-lock \
            --warn-missing-eauction \
            $FULL_RECONCILE_FLAG \
            $DEPLOY_FLAG

      - name: Post-deploy freshness check (warn-only)
        if: success() && env.REFRESH_SHOULD_RUN != 'false'
        env:
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          BASE="${SITE_BASE_URL:-https://scrapauctionindia.com/auctions}"
          PYTHONPATH=. python -m scraper.freshness_check --base-url "$BASE" --warn-only || true

      - name: Upload refresh reports
        if: always() && env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: refresh-run-${{ github.run_id }}
          path: |
            work/runs/latest.json
            work/runs/*/reports/final_report.md
            work/runs/*/reports/final_report.json
            work/runs/*/logs/
          if-no-files-found: ignore

      - name: Upload failure diagnostics
        if: failure() && env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: refresh-failure-${{ github.run_id }}
          path: |
            work/refresh.lock
            work/runs/
          if-no-files-found: ignore

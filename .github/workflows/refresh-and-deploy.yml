name: Refresh and Deploy (legacy emergency)

on:
  # Production traffic moved to pipeline-download / pipeline-parse / pipeline-deploy.
  # Keep manual emergency-only entrypoint for one cutover window.
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Hostinger after successful gates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_docs_per_run:
        description: "Max MSTC document downloads per run"
        required: false
        default: "2000"
      max_deep_scrape:
        description: "Max auctions to deep scrape in this run (legacy monolith)"
        required: false
        default: "75"
      full_reconcile:
        description: "Manual catch-up: deep scrape every new/changed/repair listing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: refresh-and-deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore AI enrichment cache
        uses: actions/cache@v4
        with:
          path: data/ai_enrichment_cache
          key: ai-enrichment-${{ runner.os }}-${{ hashFiles('scraper/ai_enrichment/schema.py', 'scraper/ai_enrichment/payload.py') }}
          restore-keys: |
            ai-enrichment-${{ runner.os }}-

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -q

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Verify deploy prerequisites
        working-directory: web
        run: pnpm run verify-deploy-prereqs

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run refresh pipeline (legacy)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
          OPENROUTER_SITE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DEPLOY_FLAG=""
          if [ "${{ github.event.inputs.deploy }}" != "false" ]; then
            DEPLOY_FLAG="--deploy"
          fi
          FULL_RECONCILE_FLAG=""
          if [ "${{ github.event.inputs.full_reconcile }}" = "true" ]; then
            FULL_RECONCILE_FLAG="--full-reconcile"
          fi
          PYTHONPATH=. python -m scraper.refresh_and_deploy \
            --sources mstc,gem_forward,eauction \
            --max-docs-per-run "${{ github.event.inputs.max_docs_per_run || '2000' }}" \
            --max-deep-scrape "${{ github.event.inputs.max_deep_scrape || '75' }}" \
            --min-count 1000 \
            --break-stale-lock \
            --warn-missing-eauction \
            $FULL_RECONCILE_FLAG \
            $DEPLOY_FLAG

      - name: Upload refresh reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-run-${{ github.run_id }}
          path: |
            work/runs/latest.json
            work/runs/*/reports/final_report.md
            work/runs/*/reports/final_report.json
            work/runs/*/logs/
          if-no-files-found: ignore

name: Lane Build Deploy

on:
  schedule:
    # Temporary backlog drain: every 15m (UTC), staggered off :00/:15/:30/:45
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      no_deploy:
        description: "Build only (skip Hostinger deploy)"
        required: false
        default: "false"
        type: boolean
      allow_small_export:
        description: "Cutover: allow small/empty publishable-only export"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      migrate_ledger_v3:
        description: "Pull Hostinger ledger, rewrite to v3, push (re-queue)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-build-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Migrate ledger to v3 (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.migrate_ledger_v3 == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: PYTHONPATH=. python -m scraper.pipeline_schema_migrate --pull --push
      - name: Build and deploy
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ENRICHMENT_DISABLE: "1"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
          PARSE_SUCCESS_PAUSE_SEC: "0"
          PARSE_WORKERS: "2"
          PARSER_CACHE_VERSION: "2"
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.no_deploy }}" = "true" ]; then
            EXTRA="$EXTRA --no-deploy"
          fi
          # Temporary cutover: schedule + manual allow_small until GeM is regularly in export
          if [ "${{ github.event.inputs.allow_small_export }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            EXTRA="$EXTRA --allow-small-export"
            export PIPELINE_ALLOW_SMALL_EXPORT=1
          fi

          # Timed smoke: parse 10 R2 PDFs then time build+deploy of that set.
          if [ "${{ github.event.inputs.allow_small_export }}" = "true" ] && [ -f tests/fixtures/smoke_ledger_deploy_10.json ]; then
            mkdir -p work
            cp tests/fixtures/smoke_ledger_deploy_10.json work/pipeline_ledger.json
            export SKIP_LEDGER_PULL=1
            export SKIP_LEDGER_PUSH=1
            export SKIP_PARSED_PULL=1
            echo "=== parse smoke (10) ahead of build-deploy ==="
            PARSE_START=$(date +%s)
            PYTHONPATH=. python -m scraper.pipeline_parse_assets \
              --break-stale-lock --max-parse 10 --wave-size 10 \
              --auction-ids 589371,589184,588623,589235,588927,590494,589397,589379,590546,588456
            echo "parse_prep_wall_sec=$(( $(date +%s) - PARSE_START ))"
            # Keep smoke rows in export even if PDF closing already passed.
            PYTHONPATH=. python - <<'PY'
import json
from pathlib import Path
from datetime import datetime, timedelta, timezone
root = Path("work/parsed/mstc")
closing = (datetime.now(timezone.utc) + timedelta(days=45)).isoformat()
opening = (datetime.now(timezone.utc) + timedelta(days=30)).isoformat()
n = 0
for p in root.glob("*.json"):
    art = json.loads(p.read_text(encoding="utf-8"))
    rec = art.get("record") or {}
    rec["closing"] = closing
    rec["opening"] = opening
    art["record"] = rec
    p.write_text(json.dumps(art, indent=2) + "\n", encoding="utf-8")
    n += 1
ledger_path = Path("work/pipeline_ledger.json")
ledger = json.loads(ledger_path.read_text(encoding="utf-8"))
for item in ledger.get("items") or []:
    item["closing"] = closing
    item["opening"] = opening
ledger_path.write_text(json.dumps(ledger, indent=2) + "\n", encoding="utf-8")
print(f"forced_future_closing artifacts={n}")
PY
            EXTRA="$EXTRA --allow-small-export"
            export PIPELINE_ALLOW_SMALL_EXPORT=1
          fi

          echo "=== build-deploy timed ==="
          START=$(date +%s)
          PYTHONPATH=. python -m scraper.pipeline_build_deploy --break-stale-lock $EXTRA
          END=$(date +%s)
          echo "build_deploy_smoke_wall_sec=$((END-START))"

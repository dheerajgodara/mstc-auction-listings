name: Bootstrap VPS MSTC env

# One-shot: write /etc/mstc-pipeline.env on the download VPS from GHA secrets.
on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Write env + hostinger key on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_DOWNLOAD_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_DOWNLOAD_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Need VPS_DOWNLOAD_HOST and VPS_DOWNLOAD_SSH_KEY secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          printf '%s\n' "$HOSTINGER_SSH_KEY" > /tmp/hostinger_key
          chmod 600 /tmp/hostinger_key
          cat > /tmp/mstc-pipeline.env <<EOF
          HOSTINGER_HOST=${HOSTINGER_HOST}
          HOSTINGER_PORT=${HOSTINGER_PORT:-22}
          HOSTINGER_USERNAME=${HOSTINGER_USERNAME}
          HOSTINGER_SSH_KEY=/root/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR=${HOSTINGER_REMOTE_DIR}
          SITE_BASE_URL=${SITE_BASE_URL}
          R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
          R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
          R2_BUCKET=${R2_BUCKET}
          R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
          R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          MEDIA_R2_ONLY=1
          DOWNLOAD_DECOUPLE_FLUSH=0
          VPS_DOWNLOAD_GAP_SEC=2
          VPS_DOWNLOAD_CONCURRENCY=2
          EOF
          # strip leading spaces from heredoc
          sed -i 's/^[[:space:]]*//' /tmp/mstc-pipeline.env
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=accept-new \
            /tmp/mstc-pipeline.env /tmp/hostinger_key \
            "root@${VPS_HOST}:/tmp/"
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=accept-new "root@${VPS_HOST}" \
            'install -m 600 /tmp/mstc-pipeline.env /etc/mstc-pipeline.env && \
             install -m 600 /tmp/hostinger_key /root/.ssh/hostinger_key && \
             rm -f /tmp/mstc-pipeline.env /tmp/hostinger_key && \
             set -a && . /etc/mstc-pipeline.env && set +a && \
             echo "ok host=$HOSTINGER_HOST bucket=$R2_BUCKET public=$R2_PUBLIC_BASE_URL telegram=${TELEGRAM_BOT_TOKEN:+set}"'

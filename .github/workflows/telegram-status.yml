name: Telegram Status Ping

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Status note body (HTML-escaped via reporter)"
        required: true
        type: string
      title:
        description: "Card title"
        required: false
        default: "Ops note"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Send ops note
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret"
            exit 1
          fi
          PYTHONPATH=. python - <<'PY'
          import os
          from scraper.telegram_reporter import send_ops_note
          title = (os.environ.get("TITLE") or "Ops note").strip() or "Ops note"
          body = os.environ.get("MESSAGE") or ""
          if not send_ops_note(title, body):
              raise SystemExit("telegram send failed")
          print("sent")
          PY

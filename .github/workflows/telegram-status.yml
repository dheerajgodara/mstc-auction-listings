name: Telegram Status Ping

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Plain-text status message to send on Telegram"
        required: true
        type: string

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ inputs.message }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret"
            exit 1
          fi
          python3 - <<'PY'
          import json, os, urllib.parse, urllib.request
          token = os.environ["TELEGRAM_BOT_TOKEN"].strip()
          chat_id = os.environ["TELEGRAM_CHAT_ID"].strip()
          text = os.environ["MESSAGE"]
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": text,
              "disable_web_page_preview": "true",
          }).encode()
          req = urllib.request.Request(url, data=data, method="POST")
          with urllib.request.urlopen(req, timeout=30) as resp:
              payload = json.loads(resp.read().decode())
          if not payload.get("ok"):
              raise SystemExit(f"telegram non-ok: {payload}")
          print("sent")
          PY

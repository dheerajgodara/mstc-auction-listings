name: Pipeline Download (legacy emergency)

# Legacy download — superseded by Lane Download MSTC / GeM. Manual only.
on:
  workflow_dispatch:
    inputs:
      source:
        description: "mstc or gem_forward"
        required: false
        default: "mstc"
      batch_size:
        description: "Batch size"
        required: false
        default: "25"
      max_batches:
        description: "Max batches"
        required: false
        default: "80"

jobs:
  pipeline-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-download-legacy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Download
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOWNLOAD_SUCCESS_PAUSE_SEC: "5"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          MEDIA_R2_ONLY: "1"
        run: |
          SOURCE="${{ github.event.inputs.source || 'mstc' }}"
          PYTHONPATH=. python -m scraper.pipeline_download \
            --source "$SOURCE" \
            --batch-size "${{ github.event.inputs.batch_size || '25' }}" \
            --max-batches "${{ github.event.inputs.max_batches || '80' }}" \
            --break-stale-lock

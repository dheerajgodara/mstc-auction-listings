name: Pipeline Download

on:
  schedule:
    # 00/06/12/18 IST (= 30 0,6,12,18 UTC)
    - cron: "30 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      max_download:
        description: "Max MSTC auctions to download (default 2000)"
        required: false
        default: "2000"
      max_docs_per_run:
        description: "Max MSTC document downloads per run"
        required: false
        default: "2000"
      retry_of:
        description: "Optional failed run id this dispatch retries"
        required: false
        default: ""

jobs:
  pipeline-download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: auction-pipeline-serial
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scheduled slot guard
        # Skip guard for automatic fast-retries so a failed slot can re-run.
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.retry_of == '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: PYTHONPATH=. python -m scraper.schedule_guard --workflow pipeline-download.yml

      - name: Set up Python
        if: env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: pip install -r requirements.txt

      - name: Configure SSH key
        if: env.REFRESH_SHOULD_RUN != 'false'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run download pipeline
        if: env.REFRESH_SHOULD_RUN != 'false'
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          MAX_DL="${{ github.event.inputs.max_download || '2000' }}"
          MAX_DOCS="${{ github.event.inputs.max_docs_per_run || '2000' }}"
          # Intra-job retry once (~2 min) for flaky setup/SSH.
          for attempt in 1 2; do
            echo "Download attempt ${attempt}/2"
            if PYTHONPATH=. python -m scraper.pipeline_download \
              --sources mstc,gem_forward,eauction \
              --max-download "$MAX_DL" \
              --max-docs-per-run "$MAX_DOCS" \
              --break-stale-lock; then
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "Download failed; sleeping 120s before intra-job retry"
              sleep 120
            fi
          done
          exit 1

      - name: Upload download reports
        if: always() && env.REFRESH_SHOULD_RUN != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-download-${{ github.run_id }}
          path: |
            work/pipeline_ledger.json
            work/runs/download_*/download_report.json
            work/runs/download_*/download.log
          if-no-files-found: ignore

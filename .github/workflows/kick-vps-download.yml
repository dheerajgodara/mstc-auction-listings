name: Kick VPS Download Worker

# Optional Phase C: SSH to always-on VPS and run scripts/download_worker.sh
# Requires secrets: VPS_SSH_HOST, VPS_SSH_PORT, VPS_SSH_USER, VPS_SSH_KEY, VPS_REPO_PATH

on:
  workflow_dispatch:
    inputs:
      source:
        description: "mstc or gem_forward"
        required: false
        default: "mstc"
      cap:
        description: "max download this kick"
        required: false
        default: "200"

jobs:
  kick-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
      - name: Remote download worker
        timeout-minutes: 25
        env:
          VPS_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
          VPS_REPO: ${{ secrets.VPS_REPO_PATH }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "VPS secrets not configured — skip"
            exit 0
          fi
          PORT="${VPS_PORT:-22}"
          REPO="${VPS_REPO:-/opt/mstc-auction-listings}"
          SRC="${{ github.event.inputs.source }}"
          CAP="${{ github.event.inputs.cap }}"
          ssh -i ~/.ssh/vps_key -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            "${VPS_USER}@${VPS_HOST}" \
            "cd '$REPO' && ./scripts/download_worker.sh '$SRC' '$CAP'"

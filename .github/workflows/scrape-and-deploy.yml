# LEGACY / MANUAL DIAGNOSTIC ONLY — NOT FOR PRODUCTION
#
# This workflow uses scraper.run_all with low defaults (MSTC-only, capped limit).
# It must NEVER run on a schedule and must NEVER deploy without explicit double confirmation.
#
# Production automation: .github/workflows/refresh-and-deploy.yml
# (full multi-source refresh via scraper.refresh_and_deploy)
name: Scrape and Deploy (legacy)

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (mstc,eauction,gem_forward)"
        required: false
        default: "mstc"
      limit:
        description: "Max auctions per source"
        required: false
        default: "300"
      deploy:
        description: "Deploy to Hostinger after build (default false — diagnostic only)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      confirm_legacy_deploy:
        description: "Type true to confirm you intend a LEGACY deploy (required with deploy=true)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/ -q

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Run scraper orchestrator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          OPENROUTER_FALLBACK_MODELS: ${{ secrets.OPENROUTER_FALLBACK_MODELS }}
          OPENROUTER_SITE_URL: ${{ secrets.SITE_BASE_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          PYTHONPATH=. python -m scraper.run_all \
            --sources "${{ github.event.inputs.sources || 'mstc' }}" \
            --out web/public/data/auctions.json \
            --pdf-dir web/public/pdfs \
            --docs-dir web/public/docs \
            --thumbs-dir web/public/thumbs \
            --limit "${{ github.event.inputs.limit || '300' }}" \
            --max-docs-per-run 100

      - name: Build frontend
        run: |
          cd web
          pnpm install --frozen-lockfile || pnpm install
          pnpm run build:prod
          pnpm run verify-build

      - name: Configure SSH key
        if: >-
          github.event_name == 'workflow_dispatch'
          && github.event.inputs.deploy == 'true'
          && github.event.inputs.confirm_legacy_deploy == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Deploy to Hostinger
        if: >-
          github.event_name == 'workflow_dispatch'
          && github.event.inputs.deploy == 'true'
          && github.event.inputs.confirm_legacy_deploy == 'true'
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: python -m scraper.deploy

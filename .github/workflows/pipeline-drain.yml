name: Pipeline Drain (legacy emergency)

# Legacy serial drain — superseded by Lane Parse Assets + Lane Build Deploy.
# Manual only (no schedule, no chain from download).
on:
  workflow_dispatch:
    inputs:
      max_parse:
        description: "Parse cap per cycle (default 100)"
        required: false
        default: "100"
      max_cycles:
        description: "Hard cap on parse→deploy cycles (default 25)"
        required: false
        default: "25"
      skip_docs:
        description: "Skip document downloads during parse"
        required: false
        default: "false"
        type: boolean

jobs:
  pipeline-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: pipeline-drain-legacy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
      - name: Drain (emergency)
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_ENRICHMENT_DISABLE: "1"
        run: |
          MAX_PARSE="${{ github.event.inputs.max_parse || '100' }}"
          MAX_CYCLES="${{ github.event.inputs.max_cycles || '25' }}"
          SKIP_DOCS="${{ github.event.inputs.skip_docs || 'false' }}"
          EXTRA_ARGS=""
          if [ "$SKIP_DOCS" = "true" ]; then
            EXTRA_ARGS="--skip-docs"
          fi
          PYTHONPATH=. python -m scraper.pipeline_drain \
            --max-parse "$MAX_PARSE" \
            --max-cycles "$MAX_CYCLES" \
            --break-stale-lock \
            $EXTRA_ARGS

name: Pipeline Drain

on:
  workflow_run:
    workflows: ["Pipeline Download"]
    types: [completed]
  schedule:
    # Safety sweep every 6h at :00 UTC (offset from download :30)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      max_parse:
        description: "Parse cap per cycle (default 100)"
        required: false
        default: "100"
      max_cycles:
        description: "Hard cap on parse→deploy cycles (default 25)"
        required: false
        default: "25"

jobs:
  pipeline-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: auction-pipeline-serial
      cancel-in-progress: false
    # After download: only on success. Schedule/manual always.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore AI enrichment cache
        uses: actions/cache@v4
        with:
          path: data/ai_enrichment_cache
          key: ai-enrichment-${{ runner.os }}-${{ hashFiles('scraper/ai_enrichment/schema.py', 'scraper/ai_enrichment/payload.py') }}
          restore-keys: |
            ai-enrichment-${{ runner.os }}-

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key

      - name: Run drain (parse 100 → deploy until clear)
        env:
          PYTHONUNBUFFERED: "1"
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_KEY: ~/.ssh/hostinger_key
          HOSTINGER_REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MAX_PARSE="${{ github.event.inputs.max_parse || '100' }}"
          MAX_CYCLES="${{ github.event.inputs.max_cycles || '25' }}"
          PYTHONPATH=. python -m scraper.pipeline_drain \
            --max-parse "$MAX_PARSE" \
            --max-cycles "$MAX_CYCLES" \
            --break-stale-lock

      - name: Upload drain reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-drain-${{ github.run_id }}
          path: |
            work/pipeline_ledger.json
            work/runs/drain_*/drain_report.json
            work/runs/drain_*/drain.log
            work/runs/parse_*/parse_report.json
            work/runs/deploy_*/deploy_report.json
          if-no-files-found: ignore
